version: '3.8'

services:
  dev:
    container_name: ibrahimethemkurt-dev
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      # Windows/Mac sistemlerde dosya değişikliklerinin algılanabilmesi için
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true

  prod:
    container_name: ibrahimethemkurt-prod
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
